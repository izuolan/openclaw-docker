services:
  openclaw-desktop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-desktop
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    # network_mode: host
    ports:
      - "3001:3001"     # VNC Web Desktop (HTTPS)
      - "18789:18789"   # OpenClaw Gateway API
    volumes:
      - /data/webtop:/config/
      - /data/openclaw/.openclaw:/config/.openclaw
      - /data/history:/config/workspace
      - /opt/openclaw/:/opt/openclaw/
    environment:
      - PUID=0
      - PGID=0
      - TZ=${TZ:-America/New_York}
      - CUSTOM_USER=${VNC_USER:-user}
      - PASSWORD=${VNC_PASSWORD:-password}
      - TITLE=OpenClaw Desktop
      - OPENCLAW_HOME=/config
      - HOME=/config
      - GATEWAY_TOKEN=${GATEWAY_TOKEN:-changeme}
      - NODE_ENV=production
      - PLAYWRIGHT_BROWSERS_PATH=/usr/lib/playwright
    shm_size: "2gb"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 1G